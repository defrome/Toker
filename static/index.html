<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TON Gift Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>TON Gift Market</h1>
      <div class="top-actions">
        <button id="refreshBtn" class="btn btn-secondary">Обновить</button>
        <a class="btn btn-secondary" href="/swagger-ui" target="_blank" rel="noreferrer">API</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel compact">
        <h2>Покупатель</h2>
        <div class="form-grid">
          <input id="tgIdInput" type="number" placeholder="Telegram ID" />
          <input id="usernameInput" type="text" placeholder="Username" />
          <input id="walletInput" type="text" placeholder="TON wallet" />
        </div>
        <button id="saveUserBtn" class="btn btn-primary">Сохранить</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Каталог NFT Gifts</h2>
          <span id="giftCount" class="muted">0</span>
        </div>
        <div id="giftGrid" class="gift-grid"></div>
      </section>

      <section class="panel compact">
        <h2>Статус</h2>
        <pre id="orderOutput">Готово к работе</pre>
      </section>
    </main>

    <template id="giftCardTemplate">
      <article class="gift-card">
        <div class="gift-image-wrap">
          <img class="gift-image" alt="NFT gift" loading="lazy" />
        </div>
        <div class="gift-meta">
          <p class="gift-rarity"></p>
          <p class="gift-slug"></p>
        </div>
        <h3 class="gift-name"></h3>
        <p class="gift-description"></p>
        <div class="gift-bottom">
          <p class="gift-price"></p>
          <button class="btn btn-primary buy-btn">Купить</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
