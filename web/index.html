<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Gifts Market</title>
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-chip">WEB3</div>
      <div>
        <h1>TG Gifts Market</h1>
        <p>Telegram collectible gifts marketplace</p>
      </div>
    </div>
    <div id="authControls" class="auth-controls"></div>
  </header>

  <main class="layout">
    <section class="panel login-panel" id="loginPanel">
      <h2>Вход в маркет</h2>
      <p>Введи Telegram ID, чтобы получить JWT-пару и открыть маркет.</p>
      <form id="loginForm" class="form-grid">
        <label>
          Telegram ID
          <input type="number" id="tgId" required min="1" placeholder="123456789" />
        </label>
        <label>
          Username
          <input type="text" id="username" placeholder="nft_hunter" />
        </label>
        <label>
          Wallet address
          <input type="text" id="wallet" placeholder="0x..." />
        </label>
        <button type="submit">Войти и получить токены</button>
      </form>
    </section>

    <section class="panel market-panel hidden" id="marketPanel">
      <div class="market-head">
        <div>
          <h2>Каталог подарков</h2>
          <p id="userMeta"></p>
        </div>
        <div class="filters">
          <button class="filter active" data-currency="all">Все</button>
          <button class="filter" data-currency="stars">Только ⭐ Stars</button>
          <button class="filter" data-currency="rub">Только ₽ RUB</button>
        </div>
      </div>

      <div id="giftsGrid" class="gifts-grid"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="/app/app.js" defer></script>
</body>
</html>
